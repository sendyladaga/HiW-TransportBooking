<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Activity 1: Feedback Hub</title>

    <style>
        .personal-info {
        border: 1px solid #000;
        padding: 10px;
        margin-bottom: 10px;
        width: 150px;
        height: 90px;   
        overflow: auto;  
        }

        .feedback-section {
        border: 1px solid #000;
        padding: 10px;
        width: 200px;
        height: auto; 
        margin-bottom: 20px;
        }

        button {
        padding: 8px 16px;
        }

    </style>

</head>
<body>
    <a href="mainpage.html"> Click here to go to back to Main Page</a><br>
    <h1>Basic Information</h1>
    <section> <section class="personal-info">
    <form>
        <label for="full name">Full name:</label><br>
        <input type="text" id="full name" name="full name" placeholder="Enter full name"><br>

        <label for="email">Email:</label><br>
        <input type="email" id="email" placeholder="Enter email"> <br>
        Input Field (Email)

    </form><br>
    </section> 

    <h1>User Survey</h1>
    <section class="feedback-section">
    <form>
         <p>How do you hear about us?</p>
    <select name="source" id="source">
        <option value="dropdown">Dropdown Menu</option>
    </select> <br>

    <p>Would you recommend us:</p>
    <input type="radio" id="yes" name="fav_language" value="yes">
    <label for="yes">Yes</label><br>

    <input type="radio" id="no" name="fav_language" value="no">
    <label for="no">No</label><br><br>

    <label for="addtl comments">Additional comments:</label><br>
        <input type="text" id="addtl comments" name="addtl comments" placeholder="Add Comments"><br>

    </form><br>
    </section> 

    <button type="submit feedback">Submit Feedback</button>

    
</body>
</html>
