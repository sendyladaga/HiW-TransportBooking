<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
<link rel="stylesheet" href="style_start new request.css">
<div class="container">

    <!-- SIDEBAR -->
    <div class="sidebar">
        <div class="logo">
            HEALTH & WEALTH
        </div>

        <ul class="menu">
            <li class="active">Home</li>
            <li>Trips</li>
        </ul>

        <div class="quick-actions">
            <h4>QUICK ACTIONS</h4>

            <button class="book-btn">+ Book Trips</button>

            #☆ Rate Trips</a>
        </div>
    </div>

    <!-- MAIN -->
    <div class="main">

        <h1>TransportBooking</h1>

        <!-- TOP FORM -->
        <div class="traveler-card">

            <div class="row full">
                <label>Traveller</label>
                <input type="text" value="LADAGA, Sendy Grace">
            </div>

            <div class="row full">
                <label>This booking is for someone else</label>
                <input type="checkbox">
            </div>

            <div class="grid-2">

                <div class="field">
                    <label>No. of Passengers *</label>
                    <input type="text" value="1">
                </div>

                <div class="field">
                    <label>Budget Center *</label>
                    <input type="text">
                </div>

                <div class="field">
                    <label>Preferred Vehicle Type</label>
                    <select>
                        <option>Please select one</option>
                    </select>
                </div>

                <div class="field">
                    <label>Purpose *</label>
                    <select>
                        <option>Please select one</option>
                    </select>
                </div>

                <div class="field">
                    <label>Cargo & Luggage</label>
                    <input type="checkbox">
                </div>

            </div>

        </div>

        <!-- BOTTOM -->
        <div class="bottom-section">

            <!-- LEFT -->
            <div class="journey-card">

                <h3>Journey Details</h3>

                <label>Departure Location *</label>
                <input type="text" value="Manila - Office">

                <label>Destination *</label>
                <input type="text" value="Department of Foreign Affairs - Home Office">

                <div class="toggle">
                    <span>Search External Location</span>
                    <input type="checkbox">
                </div>

                <label>Departure Location *</label>
                <input type="text" value="Department of Foreign Affairs - Home Office">

                <div class="toggle">
                    <span>Search External Location</span>
                    <input type="checkbox">
                </div>

                <label>Return Destination *</label>
                <input type="text" value="Manila - Office">

                <button class="preview-btn">
                    Preview Route
                </button>

            </div>

            <!-- RIGHT -->
            <div class="schedule-card">

                <h3>How would you like to schedule?</h3>

                <div class="radio-box active-box">
                    <input type="radio" checked>
                    Set departure time
                </div>

                <div class="radio-box">
                    <input type="radio">
                    Set arrival time
                </div>

                <label>Departure date & time (UTC+8)</label>

                <div class="datetime">
                    <input type="date">
                    <input type="time">
                </div>

                <div class="estimate-box">
                    <strong>Estimated arrival</strong>
                    <p>29/06/2026 14:07 (UTC+8)</p>
                </div>

                <label>Trip notes</label>

                <textarea></textarea>

            </div>

        </div>

    </div>

</div>

</body>
</html>
