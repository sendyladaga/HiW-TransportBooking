<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Activity 2: Quick Checkout</title>
   <style>
        .address {
        border: 1px solid #000;
        padding: 10px;
        margin-bottom: 10px;
        width: 150px;
        height: auto;   
        overflow: auto;  
        }

        .payment {
        border: 1px solid #000;
        padding: 10px;
        width: 200px;
        height: auto; 
        margin-bottom: 15px;
        }

        button {
        padding: 8px 16px;
        }

    </style>

</head>
<body>
<a href="mainpage.html"> Click here to go to back to Main Page</a><br>
<h1>1. Shipping Address</h1>
<section> <section class="address">
    <form>
        <label for="street add">Street Address:</label><br>
        <input type="text" id="street add" name="street add" placeholder="Input Field (Text)"><br><br>

        <label for="zip">Zip Code:</label>
        <input type="text number" id="zip" placeholder="(Text (Number)"><br>

    </form><br>
</section> 

<h1>2. Payment Information</h1>
<section> <section class="payment">
    <form>
        <label for="card no">Card Number:</label><br>
        <input type="text number" id="card no" placeholder="Input Field (Text)"> <br><br>

        <label for="expiry">Expiry Date:</label>
        <input type="date" id="expiry" placeholder="(Month)"> <br><br>

    </form><br>
</section> 

<input type="checkbox" id="sign me up" name="sign me up" value="deals"> <label for="sign me up"> Sign me up for deals!</label><br><br><br>

<button type="complete purchase">Complete Purchase</button>

</body>
</html>
