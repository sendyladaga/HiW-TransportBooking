<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HiW Corp HOME:TransportBooking</title>

<link rel="stylesheet" href="trips_page.css">

</head>
<body>

    <header class="top-bar">
        <div class="brand">
        <img src="company logo.png" alt="Company Logo" class="logo">
        <h2>TransportBooking</h2>
        </div>

      <div class="profile-container">
      <div class="profile-circle" onclick="toggleMenu()">
        LS
      </div>

      <div class="profile-dropdown" id="profileDropdown">
        <div class="dropdown-item">My Profile</div>
        <div class="dropdown-item">Sign Out</div>
      </div>

    </header>

    <div class="page-layout">

    <aside class="sidebar">
      <p class="nav-item" onclick="window.location.href='home page.html'" style="cursor:pointer;"> 🏠︎ Home</p>
      <p class="nav-item" onclick="window.location.href='trips_page.html'" style="cursor:pointer;"> ō͡≡o Trips</p>
    </aside>


<!-- CONTENT -->
            <section class="content-area">

                <h2>MY TRIPS</h2>

                <div class="trip-panel">

                    <!-- STATUS FILTERS -->
                    <div class="status-filters">

                        <label class="status-item submitted-status">
                            Submitted
                            <input type="checkbox">
                        </label>

                        <label class="status-item">
                            Scheduled
                            <input type="checkbox">
                        </label>

                        <label class="status-item">
                            In Progress
                            <input type="checkbox">
                        </label>

                        <label class="status-item">
                            Completed
                            <input type="checkbox">
                        </label>

                        <label class="status-item">
                            Cancelled
                            <input type="checkbox">
                        </label>

                    </div>


                    <!-- TRIPS TABLE -->
                    <div class="table-container">

                        <table class="trips-table">

                            <thead>
                                <tr>
                                    <th class="status-column">Status</th>

                                    <th class="reference-column">
                                        Trip Reference
                                    </th>

                                    <th class="triptype-column">
                                        Trip Type
                                    </th>

                                    <th class="hub-column">
                                        Pick-up Location
                                    </th>

                                    <th class="destination-column">
                                        <i class="fa-solid fa-location-dot"></i>
                                        Destination
                                    </th>

                                    <th class="date-column">
                                        <i class="fa-solid fa-calendar-days"></i>
                                        Start Date &amp; Time
                                    </th>

                                    <th class="action-column"></th>
                                </tr>
                            </thead>

                            <tbody>
                                <tr>

                                    <td>
                                        Submitted
                                    </td>

                                    <td>
                                        20260717-
                                    </td>

                                    <td>
                                        Round-Trip
                                    </td>

                                    <td>
                                        Manila Office
                                    </td>

                                    <td>
                                        Taguig Office
                                    </td>

                                    <td>
                                        20 Feb 2026 2:00 PM
                                    </td>

                                    <td>
                                        <button type="button" class="view-button">
                                            VIEW
                                        </button>
                                    </td>

                                </tr>
                            </tbody>

                        </table>

                    </div>

                </div>

            </section>

        </main>

    </div>

    
<script src="trip_page.js"></script>
</body>
</html>
